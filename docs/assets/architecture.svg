<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">mmx-worker-bridge architecture</title>
  <desc id="desc">Codex or Claude delegates work to mmx-worker-bridge, which calls the MiniMax mmx CLI and returns artifacts for review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f1e8"/>
      <stop offset="1" stop-color="#dff0ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1d2a2e" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#24434a"/>
    </marker>
    <style>
      .panel{fill:#fffdf8;stroke:#24434a;stroke-width:2;filter:url(#shadow)}
      .soft{fill:#eff7f3;stroke:#37636b;stroke-width:2}
      .gate{fill:#ffe7cf;stroke:#9a5628;stroke-width:2}
      .text{font-family:Georgia, 'Times New Roman', serif;fill:#1d2a2e}
      .label{font-size:22px;font-weight:700}
      .small{font-size:15px}
      .tiny{font-size:13px;fill:#4c6268}
      .arrow{stroke:#24434a;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="980" height="360" rx="28" fill="url(#bg)"/>
  <text x="42" y="52" class="text label">mmx-worker-bridge</text>
  <text x="42" y="78" class="text small">MiniMax-powered external coding workers for Codex and Claude workflows</text>

  <rect x="42" y="126" width="180" height="118" rx="18" class="panel"/>
  <text x="74" y="166" class="text label">Lead Agent</text>
  <text x="72" y="194" class="text small">Codex CLI</text>
  <text x="72" y="218" class="text small">Claude Code</text>

  <rect x="304" y="104" width="236" height="164" rx="20" class="soft"/>
  <text x="334" y="144" class="text label">Worker Bridge</text>
  <text x="334" y="176" class="text small">tool loop</text>
  <text x="334" y="200" class="text small">root-scoped tools</text>
  <text x="334" y="224" class="text small">patch artifacts</text>

  <rect x="622" y="126" width="162" height="118" rx="18" class="panel"/>
  <text x="662" y="166" class="text label">mmx CLI</text>
  <text x="650" y="198" class="text small">MiniMax model</text>
  <text x="650" y="222" class="text small">tool calls</text>

  <rect x="808" y="102" width="130" height="166" rx="20" class="gate"/>
  <text x="836" y="144" class="text label">Review</text>
  <text x="832" y="176" class="text small">result.md</text>
  <text x="832" y="200" class="text small">run.jsonl</text>
  <text x="832" y="224" class="text small">diff + tests</text>

  <path d="M226 186 H296" class="arrow"/>
  <path d="M544 186 H614" class="arrow"/>
  <path d="M786 186 H800" class="arrow"/>
  <path d="M704 252 C628 314 418 318 342 260" class="arrow"/>
  <text x="260" y="170" class="text tiny">task</text>
  <text x="558" y="170" class="text tiny">messages + tools</text>
  <text x="822" y="292" class="text tiny">lead agent decides what lands</text>
</svg>
